<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus Gate - Login & Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0c20;
            overflow: hidden;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .anime-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1920') no-repeat center center/cover;
            opacity: 0.2;
            z-index: 0;
            filter: blur(2px);
        }

        /* Container Utama Form */
        .container {
            position: relative;
            width: 400px;
            min-height: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 10;
            padding: 40px;
            overflow: hidden;
            transition: 0.5s;
        }

        .container:hover {
            border: 1px solid rgba(0, 242, 254, 0.5);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.2);
        }

        /* Mengatur perpindahan form slide */
        .form-box {
            position: absolute;
            width: calc(100% - 80px);
            transition: 0.5s ease-in-out;
        }

        /* Form Login di posisi awal, Form Register di kanan luar */
        .login-form { left: 40px; }
        .register-form { left: 450px; }

        /* Kelas aktif buat geser form */
        .container.active .login-form { left: -450px; }
        .container.active .register-form { left: 40px; }

        h2 {
            color: #fff;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f2fe;
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            outline: none;
            transition: 0.5s;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: 0.5s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            left: 0;
            color: #00f2fe;
            font-size: 12px;
            text-shadow: 0 0 5px #00f2fe;
        }

        .input-group input:focus,
        .input-group input:valid {
            border-bottom: 2px solid #00f2fe;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            outline: none;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        .submit-btn:hover {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            transform: translateY(-2px);
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .switch-link a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="anime-bg"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="container" id="container">
        
        <div class="form-box login-form">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUser" required>
                    <label>Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPass" required>
                    <label>Access Key</label>
                </div>
                <button type="submit" class="submit-btn">ACCESS OLYMPUS</button>
                <div class="switch-link">
                    Belum punya akses? <a href="#" id="toRegister">Registrasi</a>
                </div>
            </form>
        </div>

        <div class="form-box register-form">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="regUser" required>
                    <label>Create Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regPass" required>
                    <label>Create Access Key</label>
                </div>
                <button type="submit" class="submit-btn">CREATE IDENTITY</button>
                <div class="switch-link">
                    Sudah punya akses? <a href="#" id="toLogin">Login</a>
                </div>
            </form>
        </div>

    </div>

    <script>
        // --- LOGIKA TOGGLE SLIDE FORM ---
        const container = document.getElementById('container');
        const toRegister = document.getElementById('toRegister');
        const toLogin = document.getElementById('toLogin');

        toRegister.addEventListener('click', (e) => {
            e.preventDefault();
            container.classList.add('active');
        });

        toLogin.addEventListener('click', (e) => {
            e.preventDefault();
            container.classList.remove('active');
        });

        // --- LOGIKA DATABASE LOCALSTORAGE & REDIRECT ---
        const registerForm = document.getElementById('registerForm');
        const loginForm = document.getElementById('loginForm');

        // Target halaman tujuan setelah sukses login (Ganti pake link halaman lu!)
        const HALAMAN_TUJUAN = "dashboard.html";

        // Proses Registrasi
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;

            // Simpan data mentah ke localStorage browser
            localStorage.setItem('db_user', user);
            localStorage.setItem('db_pass', pass);

            alert('Identity Created! Silakan login menggunakan akun tersebut. 💀');
            container.classList.remove('active'); // Balik ke form login
            registerForm.reset();
        });

        // Proses Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            // Ambil data yang tersimpan di localStorage
            const savedUser = localStorage.getItem('db_user');
            const savedPass = localStorage.getItem('db_pass');

            // Validasi kecocokan data
            if (user === savedUser && pass === savedPass) {
                alert('ACCESS GRANTED! Membuka gerbang OLYMPUS... 😈');
                window.location.href = HALAMAN_TUJUAN; // Tembak langsung ke halaman lu!
            } else {
                alert('ACCESS DENIED! Username atau Key lu salah, yang bener lah kon***! 🤬');
            }
        });

        // --- ANIMASI BACKGROUND (PARTIKEL) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        const particleCount = 60;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1 - 0.2;
                this.color = `rgba(0, 242, 254, ${Math.random() * 0.5 + 0.2})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#00f2fe';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
                </html>
