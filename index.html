<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus Gate - Blackout Protocol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0c; /* Hitam arang */
            overflow: hidden;
            position: relative;
        }

        /* Garis Grid Scan Jahanam */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 18, 18, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 0, 0, 0));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Container Hitam Mati Total */
        .container {
            position: relative;
            width: 380px;
            min-height: 450px;
            background: #000000; /* Hitam murni mampus */
            border: 1px solid #222;
            border-radius: 4px; /* Sudut tajam biar kaku */
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.95), inset 0 0 20px rgba(255, 0, 0, 0.05);
            z-index: 10;
            padding: 40px;
            overflow: hidden;
            transition: 0.3s;
        }

        .container:hover {
            border: 1px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.2);
        }

        .form-box {
            position: absolute;
            width: calc(100% - 80px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-form { left: 40px; }
        .register-form { left: 450px; }

        .container.active .login-form { left: -450px; }
        .container.active .register-form { left: 40px; }

        h2 {
            color: #ff3333; /* Merah darah */
            font-weight: bold;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 35px;
        }

        .input-group input {
            width: 100%;
            padding: 8px 0;
            font-size: 15px;
            color: #ff3333; /* Teks input merah */
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 8px;
            left: 0;
            font-size: 14px;
            color: #555;
            pointer-events: none;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            left: 0;
            color: #ff3333;
            font-size: 11px;
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
        }

        .input-group input:focus {
            border-bottom: 1px solid #ff3333;
        }

        /* Tombol Dark Militan */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #111;
            color: #ff3333;
            border: 1px solid #ff3333;
            outline: none;
            border-radius: 2px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }

        .switch-link {
            text-align: center;
            margin-top: 30px;
            color: #444;
            font-size: 12px;
        }

        .switch-link a {
            color: #ff3333;
            text-decoration: none;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        
        <div class="form-box login-form">
            <h2>[ GATE.LOGIN ]</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUser" required autocomplete="off">
                    <label>UID_IDENTITY</label>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPass" required>
                    <label>SYS_PASSWORD</label>
                </div>
                <button type="submit" class="submit-btn">GRANT_ACCESS</button>
                <div class="switch-link">
                    NO CONNECTION? <a href="#" id="toRegister">REGISTER_ID</a>
                </div>
            </form>
        </div>

        <div class="form-box register-form">
            <h2>[ INITIALIZE ]</h2>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="regUser" required autocomplete="off">
                    <label>NEW_UID</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regPass" required>
                    <label>NEW_KEY</label>
                </div>
                <button type="submit" class="submit-btn">BUILD_IDENTITY</button>
                <div class="switch-link">
                    HAS_ACCOUNT? <a href="#" id="toLogin">BACK_TO_GATE</a>
                </div>
            </form>
        </div>

    </div>

    <script>
        const container = document.getElementById('container');
        const toRegister = document.getElementById('toRegister');
        const toLogin = document.getElementById('toLogin');

        toRegister.addEventListener('click', (e) => { e.preventDefault(); container.classList.add('active'); });
        toLogin.addEventListener('click', (e) => { e.preventDefault(); container.classList.remove('active'); });

        const registerForm = document.getElementById('registerForm');
        const loginForm = document.getElementById('loginForm');
        const WEB_PRANK_ORANG_LAIN = "https://www.google.com"; 

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            localStorage.setItem('db_user', user);
            localStorage.setItem('db_pass', pass);
            alert('[SUCCESS] ID Saved to Core Cluster.');
            container.classList.remove('active');
            registerForm.reset();
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const savedUser = localStorage.getItem('db_user');
            const savedPass = localStorage.getItem('db_pass');

            if (user === savedUser && pass === savedPass) {
                if (user.toUpperCase() === "KINGZZ") {
                    alert('[ACCESS GRANTED] INITIATING MAINFRAME CONNECTION...');
                    window.location.href = "dashboard.html";
                } else {
                    alert('[WARNING] LOW PRIVILEGE. REDIRECTING TRAFFIC...');
                    window.location.href = WEB_PRANK_ORANG_LAIN;
                }
            } else {
                alert('[DENIED] DETECTED ILLEGAL CREDENTIALS.');
            }
        });
    </script>
</body>
    </html>
