<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus Gate - Lamborghini Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Share Tech Mono', monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #050508;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND SQUAD LAMBORGHINI LU --- */
        .car-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Menggunakan gambar 3 mobil Lamborghini yang lu upload */
            background: url('https://kingzz123ik-arch.github.io/login-anime/1000462892.jpg') no-repeat center center/cover;
            opacity: 0.55; 
            z-index: 0;
            /* Filter khusus biar latar putihnya gak bikin buta, fokus ke mobilnya */
            filter: brightness(0.5) contrast(1.3) saturate(1.1);
        }

        /* Efek bayangan gelap melingkar di tepi layar (Vignette) */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.85) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- CONTAINER TRANSITION GLASS (KACA GELAP) --- */
        .container {
            position: relative;
            width: 380px;
            min-height: 450px;
            background: rgba(5, 5, 10, 0.75); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 6px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.95);
            z-index: 10;
            padding: 40px;
            overflow: hidden;
            transition: 0.3s ease-in-out;
        }

        .container:hover {
            border: 1px solid #00f2fe;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.3);
        }

        .form-box {
            position: absolute;
            width: calc(100% - 80px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-form { left: 40px; }
        .register-form { left: 450px; }

        .container.active .login-form { left: -450px; }
        .container.active .register-form { left: 40px; }

        h2 {
            color: #fff;
            font-weight: bold;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 35px;
        }

        .input-group input {
            width: 100%;
            padding: 8px 0;
            font-size: 16px;
            color: #00f2fe; 
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 8px;
            left: 0;
            font-size: 14px;
            color: #666;
            pointer-events: none;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            left: 0;
            color: #00f2fe;
            font-size: 11px;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.5);
        }

        .input-group input:focus {
            border-bottom: 1px solid #00f2fe;
        }

        /* --- BUTTON EXECUTE --- */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #00f2fe;
            border: 1px solid #00f2fe;
            outline: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: #00f2fe;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            transform: translateY(-1px);
        }

        .switch-link {
            text-align: center;
            margin-top: 30px;
            color: #444;
            font-size: 12px;
        }

        .switch-link a {
            color: #00f2fe;
            text-decoration: none;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="car-bg"></div>

    <div class="container" id="container">
        
        <div class="form-box login-form">
            <h2>[ OLYMPUS COCKPIT ]</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUser" required autocomplete="off">
                    <label>PILOT_ID</label>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPass" required>
                    <label>IGNITION_KEY</label>
                </div>
                <button type="submit" class="submit-btn">START ENGINE</button>
                <div class="switch-link">
                    NEED REGISTRATION? <a href="#" id="toRegister">REGISTER_PILOT</a>
                </div>
            </form>
        </div>

        <div class="form-box register-form">
            <h2>[ INITIALIZE ]</h2>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="regUser" required autocomplete="off">
                    <label>CREATE_PILOT_ID</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regPass" required>
                    <label>CREATE_KEY</label>
                </div>
                <button type="submit" class="submit-btn">GENERATE PILOT</button>
                <div class="switch-link">
                    ALREADY REGISTERED? <a href="#" id="toLogin">BACK_TO_GATE</a>
                </div>
            </form>
        </div>

    </div>
