<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus Gate - Login & Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0c20;
            overflow: hidden;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .anime-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1920') no-repeat center center/cover;
            opacity: 0.2;
            z-index: 0;
            filter: blur(2px);
        }

        .container {
            position: relative;
            width: 400px;
            min-height: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 10;
            padding: 40px;
            overflow: hidden;
            transition: 0.5s;
        }

        .container:hover {
            border: 1px solid rgba(0, 242, 254, 0.5);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.2);
        }

        .form-box {
            position: absolute;
            width: calc(100% - 80px);
            transition: 0.5s ease-in-out;
        }

        .login-form { left: 40px; }
        .register-form { left: 450px; }

        .container.active .login-form { left: -450px; }
        .container.active .register-form { left: 40px; }

        h2 {
            color: #fff;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f2fe;
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            outline: none;
            transition: 0.5s;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: 0.5s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            left: 0;
            color: #00f2fe;
            font-size: 12px;
            text-shadow: 0 0 5px #00f2fe;
        }

        .input-group input:focus,
        .input-group input:valid {
            border-bottom: 2px solid #00f2fe;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            outline: none;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        .submit-btn:hover {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            transform: translateY(-2px);
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .switch-link a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="anime-bg"></div>
