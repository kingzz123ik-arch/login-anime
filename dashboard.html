<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLYMPUS MAINFRAME - v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon: #00ffcc;
            --bg: #05050a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 204, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR NAV --- */
        nav {
            width: 80px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
            z-index: 100;
        }

        nav i {
            font-size: 24px;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
        }

        nav i:hover, nav i.active {
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        /* --- MAIN CONTENT --- */
        main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        /* Background Glow Effect */
        main::before {
            content: '';
            position: absolute;
            top: 10%; left: 20%;
            width: 300px; height: 300px;
            background: var(--neon);
            filter: blur(150px);
            opacity: 0.05;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            background: url('https://placehold.co/100x100/00ffcc/000?text=K') no-repeat center/cover;
        }

        /* --- DASHBOARD GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Metrics */
        .metric {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
            width: 0%;
            transition: 1s ease-in-out;
        }

        /* Crypto Module Styling */
        .crypto-box input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            font-size: 14px;
        }

        .crypto-box input:focus { border-color: var(--neon); }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-neon { background: var(--neon); color: #000; }
        .btn-neon:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }

        .btn-outline { background: transparent; border: 1px solid #ff3366; color: #ff3366; }
        .btn-outline:hover { background: #ff3366; color: #fff; }

        /* Log Section */
        .logs {
            grid-column: 1 / -1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            height: 150px;
            overflow-y: auto;
            color: #00ff55;
            background: rgba(0,0,0,0.5);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; border-right: none; border-bottom: 1px solid var(--border); }
            main { padding: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <i class="fa-solid fa-gauge-high active"></i>
        <i class="fa-solid fa-shield-halved"></i>
        <i class="fa-solid fa-code"></i>
        <i class="fa-solid fa-database"></i>
        <i class="fa-solid fa-power-off" style="margin-top: auto; color: #ff3366;" onclick="logout()"></i>
    </nav>

    <main>
        <header>
            <div>
                <h1 style="font-size: 1.5rem; letter-spacing: 2px;">MAINFRAME <span style="color: var(--neon)">CORE</span></h1>
                <p style="color: #666; font-size: 12px;">SYSTEM ID: OLYMPUS-v3-992</p>
            </div>
            <div class="user-profile">
                <div style="text-align: right;">
                    <p style="font-weight: bold; font-size: 14px;">KINGZZ</p>
                    <p style="color: var(--neon); font-size: 10px;">SUPREME CREATOR</p>
                </div>
                <div class="avatar"></div>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <h3><i class="fa-solid fa-microchip"></i> CPU UTILIZATION</h3>
                <div class="metric" id="cpu-val">24%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cpu-bar" style="width: 24%;"></div>
                </div>
            </div>

            <div class="card">
                <h3><i class="fa-solid fa-server"></i> SERVER STABILITY</h3>
                <div class="metric" style="color: var(--neon);">STABLE</div>
                <p style="font-size: 12px; color: #888;">Olympus nodes are 99.9% operational.</p>
            </div>

            <div class="card crypto-box" style="grid-column: 1 / -1;">
                <h3><i class="fa-solid fa-key"></i> OLYMPUS CRYPTOGRAPHY MODULE</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                    <div>
                        <input type="text" id="cryptoInput" placeholder="Input raw message or hash...">
                        <input type="text" id="cryptoKey" placeholder="Secret Access Key (Numeric)...">
                        <div class="btn-group">
                            <button class="btn btn-neon" onclick="processCrypto(true)">Encrypt</button>
                            <button class="btn btn-outline" onclick="processCrypto(false)">Decrypt</button>
                        </div>
                    </div>
                    <div>
                        <label style="font-size: 11px; color: #666;">OUTPUT TERMINAL:</label>
                        <textarea id="cryptoOutput" readonly style="width: 100%; height: 115px; background: #000; border: 1px solid var(--border); color: #ffcc00; padding: 10px; border-radius: 8px; resize: none; font-family: monospace;"></textarea>
                    </div>
                </div>
            </div>

            <div class="card logs" id="logBox">
                [SYSTEM] Olympus Mainframe Initialized...<br>
                [AUTH] Authorized as KINGZZ...<br>
            </div>
        </div>
    </main>

    <script>
        // --- ANIMASI METRIK ---
        function updateMetrics() {
            const cpu = Math.floor(Math.random() * 30) + 10;
            document.getElementById('cpu-val').innerText = cpu + '%';
            document.getElementById('cpu-bar').style.width = cpu + '%';
        }
        setInterval(updateMetrics, 3000);

        // --- LOGIKA KRIPTOGRAFI ---
        function processCrypto(isEncrypt) {
            const input = document.getElementById('cryptoInput').value;
            const key = parseInt(document.getElementById('cryptoKey').value);
            const output = document.getElementById('cryptoOutput');

            if (!input || isNaN(key)) {
                alert("Please provide valid input and numeric key!");
                return;
            }

            if (isEncrypt) {
                let res = "";
                for (let i = 0; i < input.length; i++) {
                    res += String.fromCharCode(input.charCodeAt(i) ^ key);
                }
                output.value = btoa(res);
                addLog(`Data encrypted with key ${key}`);
            } else {
                try {
                    let decoded = atob(input);
                    let res = "";
                    for (let i = 0; i < decoded.length; i++) {
                        res += String.fromCharCode(decoded.charCodeAt(i) ^ key);
                    }
                    output.value = res;
                    addLog(`Data decrypted with key ${key}`);
                } catch (e) {
                    alert("Decryption failed! Check your hash or key.");
                }
            }
        }

        // --- LOG TERMINAL ---
        const logBox = document.getElementById('logBox');
        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `[${time}] ${msg}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        const randomLogs = [
            "Intercepting incoming data packets...",
            "Olympus Firewall rejected unauthorized ping.",
            "Database sync in progress...",
            "Clearing system footprints...",
            "Maintenance: Node 7 refreshed."
        ];

        setInterval(() => {
            addLog(randomLogs[Math.floor(Math.random() * randomLogs.length)]);
        }, 6000);

        function logout() {
            if(confirm("Terminate session and disconnect from Olympus?")) {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
    </html>
